version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: jcb_postgres
    restart: always
    environment:
      POSTGRES_USER: jcb_admin
      POSTGRES_PASSWORD: jcb_secure_password123
      POSTGRES_DB: jcb_rental_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jcb_admin -d jcb_rental_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jcb_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://jcb_admin:jcb_secure_password123@db:5432/jcb_rental_db
      - SECRET_KEY=SUPER_SECRET_KEY_FOR_JCB_RENTAL_SYSTEM_182739
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
      - BACKEND_CORS_ORIGINS=["http://localhost:3000","http://localhost:3001","http://127.0.0.1:3000","http://127.0.0.1:3001"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jcb_frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
