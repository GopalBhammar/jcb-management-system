version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jcb_postgres
    restart: always
    environment:
      POSTGRES_USER: jcb_admin
      POSTGRES_PASSWORD: jcb_secure_password123
      POSTGRES_DB: jcb_rental_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
